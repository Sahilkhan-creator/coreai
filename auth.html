<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Core AI • Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#09090b; --panel:#111118; --panel2:#0a0a0f;
      --text:#fff; --muted:#a1a1aa; --muted2:#71717a;
      --border:rgba(255,255,255,.08); --border2:rgba(255,255,255,.05);
      --violet:#7c3aed; --violet2:#8b5cf6; --blue:#2563eb;
      --green:#10b981; --red:#ef4444;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:var(--bg);color:var(--text);
      min-height:100vh;
      background-image:
        radial-gradient(circle at 15% 15%, rgba(124,58,237,.18), transparent 30%),
        radial-gradient(circle at 85% 85%, rgba(37,99,235,.14), transparent 28%),
        radial-gradient(circle at 50% 50%, rgba(124,58,237,.04), transparent 60%);
    }
    a{color:inherit;text-decoration:none}

    /* Auth check loader */
    #auth-loader{
      position:fixed;inset:0;background:var(--bg);z-index:9999;
      display:flex;align-items:center;justify-content:center;
    }
    #auth-loader.hidden{display:none}
    .loader-spin{width:36px;height:36px;border:3px solid rgba(124,58,237,.25);border-top-color:#7c3aed;border-radius:50%;animation:spin 1s linear infinite}

    /* Noise overlay */
    .noise{position:fixed;inset:0;pointer-events:none;opacity:.025;background-image:url('https://grainy-gradients.vercel.app/noise.svg');z-index:0}

    .page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}

    /* Top nav */
    .nav{display:flex;align-items:center;justify-content:space-between;padding:20px 32px}
    .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:20px;letter-spacing:-.04em}
    .logo{width:34px;height:34px;border-radius:11px;background:linear-gradient(135deg,var(--violet),#3b82f6);display:grid;place-items:center;box-shadow:0 0 14px rgba(124,58,237,.3)}
    .logo svg{width:20px;height:20px;fill:#fff}
    .back-link{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:14px;font-weight:600;transition:.2s}
    .back-link:hover{color:#fff}
    .back-link svg{width:16px;height:16px}

    /* Auth card */
    .auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 16px 48px}
    .auth-card{
      width:100%;max-width:420px;
      background:rgba(17,17,24,.85);
      border:1px solid var(--border);
      border-radius:24px;
      padding:36px 36px 32px;
      backdrop-filter:blur(20px);
      box-shadow:0 24px 64px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.03) inset;
      position:relative;overflow:hidden;
    }
    .auth-card::before{
      content:"";position:absolute;top:-1px;left:20%;right:20%;height:1px;
      background:linear-gradient(90deg,transparent,rgba(124,58,237,.6),transparent);
    }

    /* Header */
    .auth-icon{
      width:52px;height:52px;border-radius:16px;
      background:linear-gradient(135deg,rgba(124,58,237,.25),rgba(37,99,235,.2));
      border:1px solid rgba(124,58,237,.3);
      display:grid;place-items:center;margin:0 auto 20px;
      box-shadow:0 0 24px rgba(124,58,237,.2);
    }
    .auth-icon svg{width:26px;height:26px;fill:#a78bfa}
    .auth-title{text-align:center;font-size:24px;font-weight:800;letter-spacing:-.04em;margin-bottom:6px}
    .auth-sub{text-align:center;color:var(--muted);font-size:14px;margin-bottom:28px;line-height:1.6}

    /* Tabs */
    .tabs{display:flex;background:#0a0a0f;border-radius:12px;padding:4px;margin-bottom:26px;border:1px solid var(--border2)}
    .tab{
      flex:1;text-align:center;padding:10px;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer;
      color:var(--muted);transition:.2s ease;border:none;background:transparent;
    }
    .tab.active{background:var(--panel);color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.3)}

    /* Form */
    .field{margin-bottom:16px}
    .field label{display:block;font-size:13px;font-weight:600;color:#d4d4d8;margin-bottom:7px}
    .field input{
      width:100%;background:#0a0a0f;border:1px solid var(--border);border-radius:12px;
      padding:13px 14px;color:#fff;font:inherit;font-size:15px;outline:none;
      transition:.2s ease;
    }
    .field input:focus{border-color:rgba(124,58,237,.6);box-shadow:0 0 0 3px rgba(124,58,237,.12)}
    .field input::placeholder{color:#52525b}

    /* Submit button */
    .submit-btn{
      width:100%;margin-top:8px;padding:14px;border:none;border-radius:12px;
      background:linear-gradient(135deg,var(--violet),#3b82f6);
      color:#fff;font:inherit;font-size:15px;font-weight:700;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:10px;
      transition:.2s ease;box-shadow:0 8px 20px rgba(124,58,237,.35);
      position:relative;overflow:hidden;
    }
    .submit-btn:hover:not(:disabled){filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 12px 28px rgba(124,58,237,.4)}
    .submit-btn:active{transform:translateY(0)}
    .submit-btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
    .btn-spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;flex-shrink:0}

    /* Divider */
    .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:#3f3f46;font-size:12px}
    .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border2)}

    /* Notifications */
    .notif{
      border-radius:12px;padding:13px 15px;font-size:14px;font-weight:500;
      display:flex;align-items:flex-start;gap:10px;margin-bottom:18px;
      animation:slideIn .25s ease;
    }
    .notif.success{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);color:#34d399}
    .notif.error{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.25);color:#f87171}
    .notif svg{width:16px;height:16px;flex-shrink:0;margin-top:1px}
    .notif-hidden{display:none}

    /* Footer note */
    .auth-footer{margin-top:22px;text-align:center;color:#52525b;font-size:13px;line-height:1.6}
    .auth-footer a{color:var(--muted);text-decoration:underline;text-underline-offset:3px}
    .auth-footer a:hover{color:#fff}

    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

    @media(max-width:480px){
      .auth-card{padding:28px 22px 24px;border-radius:20px}
      .nav{padding:16px 20px}
    }
  </style>
</head>
<body>
  <!-- Auth check loader -->
  <div id="auth-loader"><div class="loader-spin"></div></div>

  <div class="noise"></div>
  <div class="page" id="main-page" style="display:none">

    <nav class="nav">
      <a class="brand" href="index.html">
        <span class="logo">
          <svg viewBox="0 0 24 24"><path d="M12 2c2.8 0 5 2.2 5 5v1h1.2c1.6 0 2.8 1.3 2.8 2.8v2.4c0 1.6-1.3 2.8-2.8 2.8H17v1c0 2.8-2.2 5-5 5s-5-2.2-5-5v-1H5.8C4.2 18 3 16.7 3 15.2v-2.4C3 11.2 4.2 10 5.8 10H7V9c0-2.8 2.2-5 5-5Zm0 2C10.3 4 9 5.3 9 7v3h6V7c0-1.7-1.3-3-3-3Zm-3 7H5.8c-.5 0-.8.4-.8.8v2.4c0 .4.4.8.8.8H9V11Zm11 0H15v4h2.2c.5 0 .8-.4.8-.8v-2.4c0-.4-.4-.8-.8-.8ZM9 17v1c0 1.7 1.3 3 3 3s3-1.3 3-3v-1H9Z"/></svg>
        </span>
        Core AI
      </a>
      <a class="back-link" href="index.html">
        <svg viewBox="0 0 24 24" fill="none"><path d="M19 12H5m7-7-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Back to Home
      </a>
    </nav>

    <div class="auth-wrap">
      <div class="auth-card">
        <div class="auth-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2c2.8 0 5 2.2 5 5v1h1.2c1.6 0 2.8 1.3 2.8 2.8v2.4c0 1.6-1.3 2.8-2.8 2.8H17v1c0 2.8-2.2 5-5 5s-5-2.2-5-5v-1H5.8C4.2 18 3 16.7 3 15.2v-2.4C3 11.2 4.2 10 5.8 10H7V9c0-2.8 2.2-5 5-5Z"/></svg>
        </div>
        <div class="auth-title" id="form-title">Welcome back</div>
        <div class="auth-sub" id="form-sub">Sign in to your Core AI account</div>

        <!-- Tabs -->
        <div class="tabs">
          <button class="tab" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
          <button class="tab active" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <!-- Notification -->
        <div class="notif notif-hidden" id="notif" role="alert"></div>

        <!-- Sign In Form -->
        <div id="form-signin" style="display:none">
          <div class="field">
            <label for="signin-email">Email address</label>
            <input type="email" id="signin-email" placeholder="you@example.com" autocomplete="email" />
          </div>
          <div class="field">
            <label for="signin-password">Password</label>
            <input type="password" id="signin-password" placeholder="Enter your password" autocomplete="current-password" />
          </div>
          <button class="submit-btn" id="signin-btn" onclick="handleSignIn()">
            <span id="signin-btn-text">Sign In</span>
          </button>
        </div>

        <!-- Sign Up Form -->
        <div id="form-signup">
          <div class="field">
            <label for="signup-email">Email address</label>
            <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email" />
          </div>
          <div class="field">
            <label for="signup-password">Password</label>
            <input type="password" id="signup-password" placeholder="Minimum 8 characters" autocomplete="new-password" />
          </div>
          <div class="field">
            <label for="signup-confirm">Confirm password</label>
            <input type="password" id="signup-confirm" placeholder="Repeat your password" autocomplete="new-password" />
          </div>
          <button class="submit-btn" id="signup-btn" onclick="handleSignUp()">
            <span id="signup-btn-text">Create Account</span>
          </button>
        </div>

        <div class="auth-footer">
          By continuing, you agree to our
          <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
        </div>
      </div>
    </div>
  </div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://dazlsbgicighizzpreut.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_xpZ585KJY105smgvDWuwgQ_uX4EMaqu';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    /* ── Route guard ── */
    async function initPage() {
      try {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
          window.location.replace('chat.html');
          return;
        }
      } catch (e) {}
      document.getElementById('auth-loader').classList.add('hidden');
      document.getElementById('main-page').style.display = '';
      // Default to sign-in tab
      switchTab('signin');
    }

    /* ── Tab switching ── */
    function switchTab(tab) {
      const isSignin = tab === 'signin';
      document.getElementById('tab-signin').classList.toggle('active', isSignin);
      document.getElementById('tab-signup').classList.toggle('active', !isSignin);
      document.getElementById('form-signin').style.display = isSignin ? '' : 'none';
      document.getElementById('form-signup').style.display = isSignin ? 'none' : '';
      document.getElementById('form-title').textContent = isSignin ? 'Welcome back' : 'Create your account';
      document.getElementById('form-sub').textContent = isSignin
        ? 'Sign in to your Core AI account'
        : 'Join thousands of power users today';
      clearNotif();
    }

    /* ── Notifications ── */
    function showNotif(msg, type) {
      const el = document.getElementById('notif');
      const icon = type === 'success'
        ? '<svg viewBox="0 0 24 24" fill="none"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M22 4 12 14.01l-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M12 8v4m0 4h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>';
      el.innerHTML = icon + '<span>' + msg + '</span>';
      el.className = 'notif ' + type;
    }
    function clearNotif() {
      document.getElementById('notif').className = 'notif notif-hidden';
    }

    /* ── Loading state helpers ── */
    function setLoading(btnId, textId, loading, label) {
      const btn = document.getElementById(btnId);
      const txt = document.getElementById(textId);
      btn.disabled = loading;
      txt.textContent = label;
      if (loading) {
        const spinner = document.createElement('span');
        spinner.className = 'btn-spinner';
        spinner.id = 'spin-' + btnId;
        btn.appendChild(spinner);
      } else {
        const s = document.getElementById('spin-' + btnId);
        if (s) s.remove();
      }
    }

    /* ── Sign In ── */
    async function handleSignIn() {
      clearNotif();
      const email = document.getElementById('signin-email').value.trim();
      const password = document.getElementById('signin-password').value;
      if (!email || !password) { showNotif('Please fill in all fields.', 'error'); return; }

      setLoading('signin-btn', 'signin-btn-text', true, 'Signing in…');
      try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;
        showNotif('Signed in! Redirecting…', 'success');
        setTimeout(() => window.location.replace('chat.html'), 900);
      } catch (err) {
        showNotif(friendlyError(err.message), 'error');
        setLoading('signin-btn', 'signin-btn-text', false, 'Sign In');
      }
    }

    /* ── Sign Up ── */
    async function handleSignUp() {
      clearNotif();
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      const confirm = document.getElementById('signup-confirm').value;
      if (!email || !password || !confirm) { showNotif('Please fill in all fields.', 'error'); return; }
      if (password.length < 8) { showNotif('Password must be at least 8 characters.', 'error'); return; }
      if (password !== confirm) { showNotif('Passwords do not match.', 'error'); return; }

      setLoading('signup-btn', 'signup-btn-text', true, 'Creating account…');
      try {
        const { data, error } = await supabase.auth.signUp({ email, password });
        if (error) throw error;
        // If session exists immediately, auto-confirm is on — go to chat
        if (data.session) {
          showNotif('Account created! Redirecting…', 'success');
          setTimeout(() => window.location.replace('chat.html'), 900);
        } else {
          // Email confirmation required
          showNotif('Account created! Check your email to confirm, then sign in.', 'success');
          setLoading('signup-btn', 'signup-btn-text', false, 'Create Account');
          setTimeout(() => switchTab('signin'), 3000);
        }
      } catch (err) {
        showNotif(friendlyError(err.message), 'error');
        setLoading('signup-btn', 'signup-btn-text', false, 'Create Account');
      }
    }

    /* ── Error messages ── */
    function friendlyError(msg) {
      if (!msg) return 'Something went wrong. Please try again.';
      if (msg.includes('Invalid login credentials')) return 'Invalid email or password.';
      if (msg.includes('Email not confirmed')) return 'Please confirm your email before signing in.';
      if (msg.includes('already registered') || msg.includes('already been registered')) return 'This email is already registered. Try signing in.';
      if (msg.includes('Password should be')) return 'Password must be at least 8 characters.';
      if (msg.includes('Unable to validate')) return 'Invalid email address.';
      return msg;
    }

    /* ── Enter key support ── */
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      if (document.getElementById('form-signin').style.display !== 'none') handleSignIn();
      else handleSignUp();
    });

    initPage();
  </script>
</body>
</html>
