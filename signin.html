<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Core AI • Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#09090b; --panel:#111118; --text:#fff; --muted:#a1a1aa; --border:rgba(255,255,255,.08);
      --violet:#7c3aed; --blue:#2563eb;
    }
    *{box-sizing:border-box} html,body{margin:0;height:100%}
    body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text)}
    a{color:inherit;text-decoration:none}
    .page{min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 20% 10%, rgba(124,58,237,.12), transparent 28%), radial-gradient(circle at 80% 90%, rgba(37,99,235,.10), transparent 26%), var(--bg)}
    .noise{position:fixed;inset:0;pointer-events:none;opacity:.03;mix-blend:overlay;background-image:url('https://grainy-gradients.vercel.app/noise.svg')}
    .card{width:min(460px,calc(100% - 28px));background:rgba(17,17,24,.9);border:1px solid var(--border);border-radius:24px;padding:28px;backdrop-filter:blur(18px);box-shadow:0 20px 50px rgba(0,0,0,.45)}
    .brand{display:flex;align-items:center;gap:12px;font-size:28px;font-weight:800;letter-spacing:-.04em;margin-bottom:22px}
    .logo{width:40px;height:40px;border-radius:14px;background:linear-gradient(135deg,var(--violet),var(--blue));display:grid;place-items:center;box-shadow:0 0 15px rgba(124,58,237,.3)}
    .logo svg{width:24px;height:24px;fill:#fff}
    h1{margin:0 0 8px;font-size:34px;letter-spacing:-.06em}
    p{margin:0 0 22px;color:var(--muted);line-height:1.6}
    label{display:block;margin:16px 0 8px;color:#d4d4d8;font-size:14px;font-weight:600}
    input{width:100%;height:52px;border-radius:14px;border:1px solid var(--border);background:rgba(10,10,15,.8);color:#fff;padding:0 14px;font:inherit;outline:none}
    input:focus{border-color:rgba(124,58,237,.45)}
    .btn{width:100%;height:52px;border:0;border-radius:14px;margin-top:18px;background:linear-gradient(135deg,var(--violet),var(--blue));color:#fff;font-weight:800;font-size:15px;cursor:pointer}
    .btn:disabled{opacity:.7;cursor:not-allowed}
    .google{
      width:100%;height:52px;border-radius:14px;border:1px solid var(--border);
      background:rgba(255,255,255,.04);color:#fff;font-weight:700;font-size:15px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:10px;margin-top:12px
    }
    .google:hover{background:rgba(255,255,255,.07)}
    .divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--muted);font-size:12px}
    .divider:before,.divider:after{content:"";flex:1;height:1px;background:var(--border)}
    .alt{margin-top:18px;text-align:center;color:var(--muted)}
    .alt a{color:#c4b5fd;font-weight:700}
    .msg{margin-top:14px;font-size:14px;min-height:20px;color:#fca5a5}
    .ok{color:#86efac}
  </style>
</head>
<body>
  <div class="page">
    <div class="noise"></div>

    <form class="card" id="signinForm">
      <a class="brand" href="index.html">
        <span class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M12 2c2.8 0 5 2.2 5 5v1h1.2c1.6 0 2.8 1.3 2.8 2.8v2.4c0 1.6-1.3 2.8-2.8 2.8H17v1c0 2.8-2.2 5-5 5s-5-2.2-5-5v-1H5.8C4.2 18 3 16.7 3 15.2v-2.4C3 11.2 4.2 10 5.8 10H7V9c0-2.8 2.2-5 5-5Zm0 2C10.3 4 9 5.3 9 7v3h6V7c0-1.7-1.3-3-3-3Zm-3 7H5.8c-.5 0-.8.4-.8.8v2.4c0 .4.4.8.8.8H9V11Zm11 0H15v4h2.2c.5 0 .8-.4.8-.8v-2.4c0-.4-.4-.8-.8-.8ZM9 17v1c0 1.7 1.3 3 3 3s3-1.3 3-3v-1H9Z"/></svg>
        </span>
        Core AI
      </a>

      <h1>Sign in</h1>
      <p>Use your email and password or continue with Google.</p>

      <button class="google" type="button" id="googleBtn">
        <span>Continue with Google</span>
      </button>

      <div class="divider">OR</div>

      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" required />

      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" required />

      <button class="btn" type="submit">Sign in</button>
      <div class="msg" id="msg"></div>

      <div class="alt">
        No account? <a href="signup.html">Create one</a>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://dazlsbgicighizzpreut.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_xpZ585KJY105smgvDWuwgQ_uX4EMaqu";
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    window.CoreAuth = {
      async getCurrentSession() {
        const { data: { session } } = await client.auth.getSession();
        return session;
      },
      async signIn(email, password) {
        const { data, error } = await client.auth.signInWithPassword({ email, password });
        return { data, error: error?.message || null };
      },
      async signUp(email, password) {
        const { data, error } = await client.auth.signUp({ email, password });
        return { data, error: error?.message || null };
      },
      async signInWithGoogle() {
  const { data, error } = await client.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: "https://sahilkhan-creator.github.io/coreai/chat.html"
    }
  });
  return { data, error: error?.message || null };
},
      async signOut() {
        const { error } = await client.auth.signOut();
        return { error: error?.message || null };
      },
      client
    };

    (async () => {
  const session = await window.CoreAuth.getCurrentSession();
  if (session) window.location.replace("/coreai/chat.html");
})();
    const form = document.getElementById("signinForm");
    const msg = document.getElementById("msg");
    const btn = form.querySelector(".btn");
    const googleBtn = document.getElementById("googleBtn");

    googleBtn.addEventListener("click", async () => {
      msg.textContent = "";
      googleBtn.disabled = true;
      googleBtn.textContent = "Redirecting to Google...";
      const { error } = await window.CoreAuth.signInWithGoogle();
      if (error) {
        msg.textContent = error;
        googleBtn.disabled = false;
        googleBtn.innerHTML = "<span>Continue with Google</span>";
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      msg.textContent = "";
      msg.className = "msg";
      btn.disabled = true;
      btn.textContent = "Signing in...";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const { error } = await window.CoreAuth.signIn(email, password);

      if (error) {
        msg.textContent = error;
        btn.disabled = false;
        btn.textContent = "Sign in";
        return;
      }

      msg.textContent = "Signed in successfully. Redirecting...";
      msg.className = "msg ok";
      window.location.href = "/coreai/chat.html";
    });
  </script>
</body>
</html>
